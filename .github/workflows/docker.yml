name: Deploy to Docker

on:
  push:
    branches:
      - main
      - be/develop

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend      

    steps:
    - name: Checkout repository
      uses: actions/checkout@v2

    - name: Set up JDK 17
      uses: actions/setup-java@v2
      with:
        distribution: 'adopt'
        java-version: '17'

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build with Gradle
      run: ./gradlew bootJar

    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
        
    - name: Image build and push
      run: |
        docker build --build-arg PROFILE=dev --build-arg DEPENDENCY=build/dependency -t crurutest --platform linux/amd64 .
        docker tag crurutest:latest ${{ secrets.DOCKER_USERNAME }}/crurutest:latest
        docker push ${{ secrets.DOCKER_USERNAME }}/crurutest:latest
        
    - name: Extract secrets to .env file
      run: |
        echo DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }} >> .env
        echo DB_URL=${{ secrets.DB_URL }} >> .env
        echo DB_USER=${{ secrets.DB_USER }} >> .env
        echo DB_PASSWORD=${{ secrets.DB_PASSWORD }} >> .env
        echo DDL_AUTO=${{ secrets.DDL_AUTO }} >> .env
        echo SERVER_PORT=${{ secrets.SERVER_PORT }} >> .env

  deploy:
    runs-on: self-hosted
    needs: build
    defaults:
      run:
        working-directory: backend
    steps:
    - name: Checkout repository
      uses: actions/checkout@v2

    - name: Build and push Docker image
      run: |
        docker-compose --env-file .env -f docker-compose.yml build
        docker-compose --env-file .env -f docker-compose.yml push

    - name: Deploy
      run: |
        docker-compose --env-file .env -f docker-compose.yml up -d
