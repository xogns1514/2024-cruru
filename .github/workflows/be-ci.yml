name: BR-DEV CI

on:
  push:
    branches: [ "be/dev" ]
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Build project using Gradle
      run: ./gradlew clean bootJar

    - name: Upload build artifact
      uses: actions/upload-artifact@v3
      with:
        name: cruru-be-develop-jar
        path: build/libs/cruru-0.0.1-SNAPSHOT.jar
        

  build-image:
   runs-on: ubuntu-latest
   needs: build
   
   steps:
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v1
        
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v1
        
      - name: Login to DockerHub
        uses: docker/login-action@v1
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          
      - name: Build and push
        id: docker_build
        uses: docker/build-push-action@v2
        with:
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/cruru_dev:latest
      -
        name: Image digest
        run: echo ${{ steps.docker_build.outputs.digest }}

  deploy:
    runs-on: self-hosted
    needs: build

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v3
        with:
          name: cruru-be-develop-jar
          path: ./build/libs

      - name: SSH and deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          passphrase: ${{ secrets.EC2_PASSPHRASE }}
          script: |
            cd /path/to/your/docker-compose
            docker-compose pull
            docker-compose up -d

      - name: Check if cruru server is running on port 8081
        id: check-server-on-port
        run: |
          echo "Checking if port 8081 is in use..."
          PID=$(lsof -t -i:8081 || true)
          if [ -n "$PID" ]; then
            echo "server_running=true" >> $GITHUB_ENV
            echo "PID=$PID" >> $GITHUB_ENV
          else
            echo "server_running=false" >> $GITHUB_ENV
          fi

      - name: Stop server if running
        if: env.server_running == 'true'
        run: |
          echo "Stopping server running on port 8081..."
          kill -9 $PID
          echo "Preivous running Server stopped."

      - name: Start server
        run: |
          nohup java -jar build/libs/cruru-0.0.1-SNAPSHOT.jar &
          echo "Lastest Backend API Server started."
